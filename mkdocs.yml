site_name: moin2gitwiki
site_description: "Convert MoinMoin filesystem into github/gitlab/gitea type git based wiki"
site_url: "https://amulet1.github.io/moin2gitwiki/"
repo_url: "https://github.com/amulet1/moin2gitwiki"
repo_name: "moin2gitwiki"

nav:
  - Overview: index.md
  - Commands: commands.md
  - Changelog: changelog.md
  - Internal:
    - Category Tree:      internal/categorytree.md
    - CLI:                internal/cli.md
    - Context:            internal/context.md
    - Fetch Cache:        internal/fetch_cache.md
    - Git Revision:       internal/gitrevision.md
    - Moin To Markdown:   internal/moin2markdown.md
    - Users:              internal/users.md
    - Wiki Index:         internal/wikiindex.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.expand

extra_css:
  - css/mkdocstrings.css

markdown_extensions:
  - pymdownx.highlight:
      linenums_style: pymdownx.inline
  - pymdownx.magiclink
  - pymdownx.superfences
  - markdown_include.include
  - mkdocs-click

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          rendering:
            show_source: true
          selection:
            new_path_syntax: yes
            filters:
              - "!^_"  # exlude all members starting with _
      watch:
        - moin2gitwiki
# end
